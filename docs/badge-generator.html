<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BadgeForge - GitHub README 徽章生成器</title>
  <meta name="description" content="免费在线生成漂亮的 GitHub README 徽章，支持自定义颜色、图标、样式。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f6f8fa;
      color: #1f2328;
      padding: 24px;
      line-height: 1.6;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 28px; color: #6e40c9; margin-bottom: 8px; }
    .subtitle { color: #656d76; margin-bottom: 32px; }

    .card {
      background: white;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card h2 { font-size: 18px; margin-bottom: 16px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-group { margin-bottom: 12px; }
    .form-group.full { grid-column: 1 / -1; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #656d76; }
    input, select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 14px;
      background: white;
      color: #1f2328;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #6e40c9;
      box-shadow: 0 0 0 3px rgba(110,64,201,0.15);
    }
    .color-row { display: flex; gap: 8px; align-items: center; }
    .color-row input[type="color"] { width: 48px; height: 36px; padding: 2px; flex-shrink: 0; }

    .preview-box {
      background: #f6f8fa;
      border: 2px dashed #d0d7de;
      border-radius: 8px;
      padding: 40px 24px;
      text-align: center;
      margin-bottom: 16px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: #6e40c9; color: white; }
    .btn-primary:hover { background: #5a32a3; }
    .btn-secondary { background: #f6f8fa; color: #1f2328; border: 1px solid #d0d7de; }
    .btn-secondary:hover { background: #eaeef2; }

    .btn-group { display: flex; gap: 8px; margin-top: 16px; }

    code { background: #f6f8fa; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .markdown-output {
      background: #0d1117;
      color: #c9d1d9;
      padding: 16px;
      border-radius: 8px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 13px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      cursor: pointer;
    }
    .markdown-output:hover { background: #161b22; }
    .copy-notice { font-size: 12px; color: #656d76; margin-top: 4px; }

    .template-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .template-btn {
      padding: 6px 14px;
      border: 1px solid #d0d7de;
      border-radius: 20px;
      font-size: 13px;
      background: white;
      cursor: pointer;
      transition: all 0.15s;
    }
    .template-btn:hover { border-color: #6e40c9; color: #6e40c9; }

    footer {
      text-align: center;
      padding: 32px 0;
      color: #656d76;
      font-size: 13px;
    }
    footer a { color: #6e40c9; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    .ad-section {
      background: linear-gradient(135deg, #f0e6ff, #e6f0ff);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 24px;
    }
    .ad-section p { font-size: 14px; margin-bottom: 8px; }
    .ad-section a { color: #6e40c9; font-weight: 600; text-decoration: none; }
    .ad-section a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔱 BadgeForge</h1>
    <p class="subtitle">免费、漂亮的 GitHub README 徽章生成器。即改即看，一键复制。</p>

    <!-- Cross-promotion -->
    <div class="ad-section">
      <p>⚡ 正在浏览 GitHub？试试 <strong>GitBoost</strong> — README 目录 + 仓库洞察面板，提升你的 GitHub 体验！</p>
      <a href="index.html">了解更多 →</a>
    </div>

    <div class="card">
      <h2>🎨 设计你的徽章</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="label">左侧标签</label>
          <input type="text" id="label" value="version">
        </div>
        <div class="form-group">
          <label for="value">右侧值</label>
          <input type="text" id="value" value="1.0.0">
        </div>
        <div class="form-group color-row">
          <div style="flex:1">
            <label for="labelColor">标签颜色</label>
            <input type="color" id="labelColor" value="#6e40c9">
          </div>
          <div style="flex:1">
            <label for="valueColor">值颜色</label>
            <input type="color" id="valueColor" value="#2da44e">
          </div>
        </div>
        <div class="form-group">
          <label for="style">样式</label>
          <select id="style">
            <option value="flat">Flat</option>
            <option value="flat-square" selected>Flat Square</option>
            <option value="plastic">Plastic</option>
            <option value="for-the-badge">For The Badge</option>
            <option value="social">Social</option>
          </select>
        </div>
        <div class="form-group full">
          <label for="logo">Logo 图标名称（<a href="https://simpleicons.org" target="_blank" style="font-weight:400">Simple Icons</a>）</label>
          <input type="text" id="logo" placeholder="github, npm, docker, python, javascript...">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>📐 预览</h2>
      <div class="preview-box" id="preview">
        <img id="badgePreview" src="" alt="Badge Preview">
      </div>

      <h2>📋 Markdown 代码</h2>
      <div class="markdown-output" id="markdownOutput" onclick="copyMarkdown()">点击生成预览</div>
      <div class="copy-notice" id="copyNotice">💡 点击代码框即可复制</div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateBadge()">✨ 生成</button>
        <button class="btn btn-secondary" onclick="copyMarkdown()">📋 复制</button>
        <button class="btn btn-secondary" onclick="downloadSVG()">⬇️ 下载 SVG</button>
      </div>
    </div>

    <div class="card">
      <h2>🔥 常用模板</h2>
      <div class="template-badges" id="templates"></div>
      <p style="font-size:13px;color:#656d76">点击模板自动填入并生成</p>
    </div>

    <footer>
      <a href="index.html">← GitBoost 首页</a> · BadgeForge · 免费开源工具
    </footer>
  </div>

  <script>
    const TEMPLATES = [
      { label: 'version', value: '1.0.0', labelColor: '#6e40c9', valueColor: '#2da44e', logo: 'github' },
      { label: 'build', value: 'passing', labelColor: '#555', valueColor: '#2da44e', logo: '' },
      { label: 'coverage', value: '95%', labelColor: '#555', valueColor: '#2da44e', logo: '' },
      { label: 'license', value: 'MIT', labelColor: '#555', valueColor: '#3178c6', logo: '' },
      { label: 'downloads', value: '10k/month', labelColor: '#555', valueColor: '#cb3837', logo: 'npm' },
      { label: 'docker', value: 'pulls 1M+', labelColor: '#555', valueColor: '#2496ed', logo: 'docker' },
      { label: 'node', value: '>=18.0', labelColor: '#555', valueColor: '#339933', logo: 'node.js' },
      { label: 'python', value: '3.12', labelColor: '#555', valueColor: '#3776AB', logo: 'python' },
      { label: 'PRs', value: 'welcome', labelColor: '#555', valueColor: '#ff6b6b', logo: '' },
      { label: 'chat', value: 'Discord', labelColor: '#555', valueColor: '#5865F2', logo: 'discord' },
    ];

    function init() {
      const container = document.getElementById('templates');
      TEMPLATES.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'template-btn';
        btn.textContent = `${t.label}: ${t.value}`;
        btn.onclick = () => {
          document.getElementById('label').value = t.label;
          document.getElementById('value').value = t.value;
          document.getElementById('labelColor').value = t.labelColor;
          document.getElementById('valueColor').value = t.valueColor;
          document.getElementById('logo').value = t.logo;
          generateBadge();
        };
        container.appendChild(btn);
      });

      // Auto-generate on first load
      generateBadge();

      // Auto-generate on any input change
      document.querySelectorAll('input, select').forEach(el => {
        el.addEventListener('input', generateBadge);
        el.addEventListener('change', generateBadge);
      });
    }

    function generateBadge() {
      const label = encodeURIComponent(document.getElementById('label').value || 'label');
      const value = encodeURIComponent(document.getElementById('value').value || 'value');
      const labelColor = document.getElementById('labelColor').value.slice(1);
      const valueColor = document.getElementById('valueColor').value.slice(1);
      const style = document.getElementById('style').value;
      const logo = document.getElementById('logo').value.trim();
      const logoParam = logo ? `&logo=${encodeURIComponent(logo)}` : '';

      const url = `https://img.shields.io/badge/${label}-${value}-${valueColor}?style=${style}&labelColor=${labelColor}${logoParam}`;
      document.getElementById('badgePreview').src = url;
      document.getElementById('badgePreview').alt = `${document.getElementById('label').value}: ${document.getElementById('value').value}`;

      const md = `![${document.getElementById('label').value}](https://img.shields.io/badge/${label}-${value}-${valueColor}?style=${style}&labelColor=${labelColor}${logoParam})`;
      document.getElementById('markdownOutput').textContent = md;
    }

    function copyMarkdown() {
      const md = document.getElementById('markdownOutput').textContent;
      if (!md || md === '点击生成预览') return;
      navigator.clipboard.writeText(md).then(() => {
        const notice = document.getElementById('copyNotice');
        notice.textContent = '✅ 已复制到剪贴板！';
        setTimeout(() => { notice.textContent = '💡 点击代码框即可复制'; }, 2000);
      });
    }

    function downloadSVG() {
      const img = document.getElementById('badgePreview');
      if (!img.src || img.src.includes('undefined')) return;
      // Fetch the SVG and download
      fetch(img.src).then(r => r.text()).then(svg => {
        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `badge-${document.getElementById('label').value || 'badge'}.svg`;
        a.click();
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
