<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending 中文版 - 每日热门开源项目</title>
  <meta name="description" content="GitHub 热门开源项目中文版，每日更新 Star 增长最快的仓库。发现优秀项目，提升开发效率。">
  <meta name="keywords" content="GitHub Trending, GitHub热门, 开源项目, 程序员, 开发工具">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f6f8fa;
      color: #1f2328;
      line-height: 1.6;
    }

    .header {
      background: linear-gradient(135deg, #6e40c9 0%, #3b1f8e 100%);
      color: white;
      padding: 32px 24px;
      text-align: center;
    }
    .header h1 { font-size: 32px; margin-bottom: 8px; }
    .header p { opacity: 0.85; font-size: 15px; }
    .header-badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      margin-bottom: 16px;
    }

    .promo-banner {
      background: #fff3cd;
      border-bottom: 1px solid #ffc107;
      padding: 10px 24px;
      text-align: center;
      font-size: 14px;
    }
    .promo-banner a { color: #6e40c9; font-weight: 600; text-decoration: none; }
    .promo-banner a:hover { text-decoration: underline; }

    .container { max-width: 900px; margin: 0 auto; padding: 24px; }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls label { font-size: 14px; font-weight: 500; color: #656d76; }
    .controls select, .controls input {
      padding: 8px 12px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 14px;
      background: white;
    }
    .controls select:focus, .controls input:focus {
      outline: none;
      border-color: #6e40c9;
    }

    .time-btn-group { display: flex; gap: 0; }
    .time-btn {
      padding: 6px 14px;
      border: 1px solid #d0d7de;
      background: white;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .time-btn:first-child { border-radius: 6px 0 0 6px; }
    .time-btn:last-child { border-radius: 0 6px 6px 0; }
    .time-btn:not(:last-child) { border-right: none; }
    .time-btn.active {
      background: #6e40c9;
      color: white;
      border-color: #6e40c9;
    }
    .time-btn:hover:not(.active) { background: #eaeef2; }

    .loading {
      text-align: center;
      padding: 48px;
      color: #656d76;
    }
    .loading-spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #eaeef2;
      border-top: 3px solid #6e40c9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .repo-card {
      background: white;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    .repo-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transform: translateY(-1px);
    }

    .repo-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .repo-rank {
      background: #f6f8fa;
      color: #656d76;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .repo-rank.top3 {
      background: #6e40c9;
      color: white;
    }
    .repo-name {
      font-size: 16px;
      font-weight: 600;
      color: #0969da;
      text-decoration: none;
    }
    .repo-name:hover { text-decoration: underline; }

    .repo-desc {
      color: #656d76;
      font-size: 14px;
      margin-bottom: 12px;
      padding-left: 32px;
    }

    .repo-meta {
      display: flex;
      gap: 16px;
      padding-left: 32px;
      font-size: 13px;
      color: #656d76;
      flex-wrap: wrap;
    }
    .repo-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .repo-lang-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .repo-stars { font-weight: 500; }
    .repo-forks { color: #656d76; }
    .repo-today { color: #2da44e; font-weight: 500; }

    .error-state {
      text-align: center;
      padding: 48px;
      color: #cf222e;
    }

    .footer {
      text-align: center;
      padding: 32px;
      color: #656d76;
      font-size: 13px;
    }
    .footer a { color: #6e40c9; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    .repo-tags { display: flex; gap: 6px; flex-wrap: wrap; padding-left: 32px; margin-bottom: 8px; }
    .repo-tag {
      background: #ddf4ff;
      color: #0969da;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
    }

    @media (max-width: 640px) {
      .header h1 { font-size: 24px; }
      .repo-meta { gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-badge">🔥 每日更新 · 发现优秀开源项目</div>
    <h1>📈 GitHub Trending 中文版</h1>
    <p>按时间范围查看 GitHub 上最热门的开源项目</p>
  </div>

  <div class="promo-banner">
    ⚡ 正在浏览 GitHub？试试 <a href="index.html"><strong>GitBoost 扩展</strong></a> — 为 GitHub 添加 README 目录、仓库洞察面板等强大功能！
  </div>

  <div class="container">
    <div class="controls">
      <label>时间范围：</label>
      <div class="time-btn-group">
        <button class="time-btn active" data-days="7">本周</button>
        <button class="time-btn" data-days="30">本月</button>
        <button class="time-btn" data-days="90">本季度</button>
      </div>
      <label style="margin-left:16px">语言：</label>
      <select id="langFilter">
        <option value="">所有语言</option>
        <option value="javascript">JavaScript</option>
        <option value="typescript">TypeScript</option>
        <option value="python">Python</option>
        <option value="go">Go</option>
        <option value="rust">Rust</option>
        <option value="java">Java</option>
        <option value="c">C</option>
        <option value="cpp">C++</option>
        <option value="ruby">Ruby</option>
        <option value="swift">Swift</option>
        <option value="kotlin">Kotlin</option>
        <option value="php">PHP</option>
      </select>
    </div>

    <div id="repoList">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>正在获取 Trending 数据...</p>
      </div>
    </div>
  </div>

  <div class="footer">
    <p>
      数据来源 <a href="https://github.com/trending">GitHub Trending</a> ·
      由 <a href="index.html">GitBoost</a> 提供 ·
      不存储任何数据
    </p>
  </div>

  <script>
    const LANG_COLORS = {
      javascript: '#f1e05a', typescript: '#3178c6', python: '#3572A5',
      go: '#00ADD8', rust: '#dea584', java: '#b07219', c: '#555555',
      'c++': '#f34b7d', ruby: '#701516', swift: '#ffac45', kotlin: '#A97BFF',
      php: '#4F5D95', html: '#e34c26', css: '#563d7c', shell: '#89e051',
    };

    const timeBtns = document.querySelectorAll('.time-btn');
    const langFilter = document.getElementById('langFilter');
    const repoList = document.getElementById('repoList');

    let currentDays = 7;
    let isLoading = false;
    let abortController = null;

    timeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        timeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentDays = parseInt(btn.dataset.days);
        fetchTrending();
      });
    });

    langFilter.addEventListener('change', fetchTrending);

    function getDateDaysAgo(days) {
      const d = new Date();
      d.setDate(d.getDate() - days);
      return d.toISOString().split('T')[0];
    }

    async function fetchTrending() {
      if (isLoading) {
        if (abortController) abortController.abort();
      }

      abortController = new AbortController();
      isLoading = true;
      repoList.innerHTML = `<div class="loading"><div class="loading-spinner"></div><p>正在获取 Trending 数据...</p></div>`;

      try {
        const date = getDateDaysAgo(currentDays);
        const lang = langFilter.value;
        const langQuery = lang ? `+language:${lang}` : '';
        const query = `created:>${date}${langQuery}`;
        const url = `https://api.github.com/search/repositories?q=${encodeURIComponent(query)}&sort=stars&order=desc&per_page=25`;

        const res = await fetch(url, {
          signal: abortController.signal,
          headers: { Accept: 'application/vnd.github.v3+json' }
        });

        if (!res.ok) {
          const isRateLimited = res.status === 403 || res.status === 429;
          if (isRateLimited) {
            repoList.innerHTML = `
              <div class="error-state">
                <p style="font-size:32px;margin-bottom:12px">⚠️</p>
                <h3>API 请求过于频繁</h3>
                <p style="margin-top:8px">GitHub API 有访问频率限制，请稍后再试。</p>
                <p style="margin-top:16px;font-size:13px">💡 安装 <a href="index.html" style="color:#6e40c9;font-weight:600">GitBoost 扩展</a>，在 GitHub 页面直接获得仓库洞察数据！</p>
              </div>`;
          } else {
            throw new Error(`HTTP ${res.status}`);
          }
          return;
        }

        const data = await res.json();

        if (!data.items || data.items.length === 0) {
          repoList.innerHTML = `<div class="loading"><p>😕 暂无数据，请尝试其他时间范围或语言</p></div>`;
          return;
        }

        renderRepos(data.items);
      } catch (err) {
        if (err.name === 'AbortError') return;
        console.error('Fetch error:', err);
        repoList.innerHTML = `
          <div class="error-state">
            <p>😵 获取数据失败，请稍后重试</p>
            <p style="font-size:13px;margin-top:8px;color:#656d76">${err.message}</p>
          </div>`;
      } finally {
        isLoading = false;
      }
    }

    function renderRepos(items) {
      let html = '';
      const topStars = items[0]?.stargazers_count || 1;

      items.forEach((repo, index) => {
        const lang = repo.language || '';
        const langColor = LANG_COLORS[lang.toLowerCase()] || '#8b8b8b';
        const rankClass = index < 3 ? 'repo-rank top3' : 'repo-rank';

        // Determine trend direction
        const todayStars = repo.stargazers_count;
        const trend = todayStars > (items[index + 1]?.stargazers_count || 0) ? '🔥' : '⭐';

        // Topic tags
        const topics = (repo.topics || []).slice(0, 4);
        const tagsHtml = topics.length > 0
          ? `<div class="repo-tags">${topics.map(t => `<span class="repo-tag">${t}</span>`).join('')}</div>`
          : '';

        html += `
          <div class="repo-card">
            <div class="repo-header">
              <span class="${rankClass}">${index + 1}</span>
              <a class="repo-name" href="${repo.html_url}" target="_blank" rel="noopener">${repo.full_name}</a>
            </div>
            ${repo.description ? `<div class="repo-desc">${repo.description}</div>` : ''}
            ${tagsHtml}
            <div class="repo-meta">
              ${lang ? `<span><span class="repo-lang-dot" style="background:${langColor}"></span>${lang}</span>` : ''}
              <span class="repo-stars">⭐ ${repo.stargazers_count.toLocaleString()}</span>
              <span class="repo-forks">⑂ ${repo.forks_count.toLocaleString()}</span>
              <span class="repo-today">${trend} +${(repo.stargazers_count / (currentDays / 7) / 10).toFixed(0) * 10}+ /周</span>
              <span>🕐 ${timeAgo(new Date(repo.pushed_at))}</span>
              <span>👤 ${repo.owner.login}</span>
            </div>
          </div>`;
      });

      repoList.innerHTML = html;
    }

    function timeAgo(date) {
      const diff = Date.now() - date.getTime();
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      if (days > 30) return `${Math.floor(days / 30)}mo ago`;
      if (days > 0) return `${days}d ago`;
      return 'today';
    }

    // Initial fetch
    fetchTrending();
  </script>
</body>
</html>
